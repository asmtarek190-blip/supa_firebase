name: Supabase Workers (Hourly)

on:
  #schedule:
  #  - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-workers:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    strategy:
      matrix:
        worker: [1, 2, 3, 4, 5]   # number of parallel workers

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install requests

      - name: Run worker
        run: python -u script.py
        env:
          WORKER_ID: worker${{ matrix.worker }}
